# Airflow Configuration - MWAA Environment: prod-data-pipeline
# This is a simulated configuration for demonstration purposes

[core]
dags_folder = /usr/local/airflow/dags
base_log_folder = /usr/local/airflow/logs
executor = CeleryExecutor
load_examples = False
default_timezone = UTC

[logging]
# Remote logging configuration - logs are stored in S3
remote_logging = True
remote_log_conn_id = aws_default
remote_base_log_folder = s3://acme-corp-airflow-prod/logs
encrypt_s3_logs = False
logging_level = INFO
fab_logging_level = WARNING

# CloudWatch is also enabled via MWAA
# Task logs go to: airflow-prod-data-pipeline-Task
# Scheduler logs go to: airflow-prod-data-pipeline-Scheduler
# Worker logs go to: airflow-prod-data-pipeline-Worker

[webserver]
base_url = https://a1b2c3d4-e5f6-7890-abcd-ef1234567890.c1.us-east-1.airflow.amazonaws.com
web_server_host = 0.0.0.0
web_server_port = 8080
expose_config = False
rbac = True

[api]
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
access_control_allow_headers = origin, content-type, accept
access_control_allow_methods = POST, GET, OPTIONS, DELETE, PATCH
access_control_allow_origins = *

[celery]
broker_url = sqs://
result_backend = db+postgresql://airflow:***@airflow-db.cluster-xxxx.us-east-1.rds.amazonaws.com:5432/airflow
worker_concurrency = 4

[scheduler]
dag_dir_list_interval = 30
min_file_process_interval = 30
scheduler_heartbeat_sec = 5
num_runs = -1

[database]
sql_alchemy_conn = postgresql+psycopg2://airflow:***@airflow-db.cluster-xxxx.us-east-1.rds.amazonaws.com:5432/airflow
sql_alchemy_pool_size = 5
sql_alchemy_pool_recycle = 1800

[smtp]
smtp_host = email-smtp.us-east-1.amazonaws.com
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
smtp_mail_from = airflow@acme-corp.com

[secrets]
backend = airflow.providers.amazon.aws.secrets.secrets_manager.SecretsManagerBackend
backend_kwargs = {"connections_prefix": "airflow/connections", "variables_prefix": "airflow/variables"}
